name: HomeSecure
version: "1.0.0"
slug: homesecure
description: Complete home security system with alarm panel, user management, and Z-Wave lock integration
url: https://github.com/motrock/homesecure-addon
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
init: false
startup: application
boot: auto
hassio_api: true
hassio_role: default
homeassistant_api: true
auth_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:shield-home
panel_title: HomeSecure

options:
  admin_name: "Admin"
  admin_pin: "123456"
  zwave_server_url: "ws://a0d7b954-zwavejs2mqtt:3000"
  log_level: "info"
  
schema:
  admin_name: str
  admin_pin: password
  zwave_server_url: str
  log_level: list(debug|info|warning|error)?

ports:
  8099/tcp: 8099

ports_description:
  8099/tcp: "Web interface for HomeSecure management"

map:
  - config:rw
  - share:rw
  - ssl:ro

image: "ghcr.io/motrock/homesecure-{arch}"