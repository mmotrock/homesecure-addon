name: HomeSecure
version: "2.1.0"
slug: homesecure
description: >
  Complete home security system — alarm panel, user management, and Z-Wave lock
  integration.  Exposes a REST/WebSocket API that the HomeSecure HA integration
  uses; no custom_component installation needed.
url: https://github.com/mmotrock/homesecure-addon
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
init: false
startup: application
boot: auto
hassio_api: true
hassio_role: default
homeassistant_api: false   # no longer needs HA API — pure container service
auth_api: false
ingress: true
ingress_port: 8099
panel_icon: mdi:shield-home
panel_title: HomeSecure
watchdog: true

options:
  zwave_server_url: "ws://a0d7b954-zwavejs2mqtt:3000"
  log_level: "info"
  api_token: ""            # optional — leave blank to disable token auth

schema:
  zwave_server_url: str
  log_level: list(debug|info|warning|error)?
  api_token: str?

ports:
  8099/tcp: 8099

ports_description:
  8099/tcp: "HomeSecure REST + WebSocket API"

map:
  - config:rw    # write Lovelace cards to /config/www
  - share:rw
  - ssl:ro
  - data:rw      # persistent DB at /data/homesecure.db

image: "ghcr.io/mmotrock/homesecure-{arch}"
