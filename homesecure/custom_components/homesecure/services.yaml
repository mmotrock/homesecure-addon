# HomeSecure HA Integration — Services
#
# Most operations (add_user, update_config, sync_locks, etc.) are now
# performed directly against the container REST API from the Lovelace cards
# or automations using the `rest_command` integration.
#
# These HA services are kept because they're useful inside HA automations
# and scripts where you don't want to manage HTTP calls manually.

arm_away:
  name: Arm Away
  description: Arm the alarm system in away mode.
  fields:
    pin:
      name: PIN Code
      description: User PIN (6–8 digits). Leave blank to use the internal service PIN.
      required: false
      example: "123456"
      selector:
        text:
          type: password

arm_home:
  name: Arm Home
  description: Arm the alarm system in home/stay mode.
  fields:
    pin:
      name: PIN Code
      description: User PIN (6–8 digits). Leave blank to use the internal service PIN.
      required: false
      example: "123456"
      selector:
        text:
          type: password

disarm:
  name: Disarm
  description: Disarm the alarm system.
  fields:
    pin:
      name: PIN Code
      description: User PIN (6–8 digits). Required.
      required: true
      example: "123456"
      selector:
        text:
          type: password
